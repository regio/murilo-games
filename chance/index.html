<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chance of Death</title>
    <style>
        :root {
            --bg: #0d0d14;
            --card: #13131f;
            --card2: #1a1a2e;
            --accent: #e63946;
            --accent2: #ff6b6b;
            --text: #e0e0e0;
            --muted: #7777aa;
            --border: #2a2a3e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        #app {
            width: 100%;
            max-width: 580px;
        }

        .screen { animation: fadeUp 0.28s ease; }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ── Title ── */
        .title {
            text-align: center;
            margin-bottom: 36px;
        }
        .title h1 {
            font-size: 2.8rem;
            font-weight: 900;
            color: var(--accent);
            letter-spacing: -1px;
            text-shadow: 0 0 50px rgba(230,57,70,0.45);
        }
        .title p {
            color: var(--muted);
            font-size: 0.95rem;
            margin-top: 6px;
        }

        /* ── Cards ── */
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 22px;
            margin-bottom: 14px;
        }

        .section-label {
            font-size: 0.72rem;
            font-weight: 700;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 1.4px;
            margin-bottom: 16px;
        }

        /* ── Scenario grid ── */
        .scenario-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .scenario-btn {
            background: var(--card2);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 22px 14px;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.18s, transform 0.18s, background 0.18s;
            color: var(--text);
        }
        .scenario-btn:hover {
            border-color: var(--accent);
            background: #1f1f35;
            transform: translateY(-2px);
        }
        .scenario-btn .s-emoji { font-size: 2.4rem; display: block; margin-bottom: 8px; }
        .scenario-btn .s-name { font-size: 0.9rem; font-weight: 600; }

        /* ── Input ── */
        input[type="number"] {
            width: 100%;
            padding: 14px 18px;
            background: var(--card2);
            border: 1px solid var(--border);
            border-radius: 9px;
            color: var(--text);
            font-size: 1.25rem;
            outline: none;
            transition: border-color 0.2s;
        }
        input[type="number"]:focus { border-color: var(--accent); }
        input[type="number"].error  { border-color: var(--accent); }

        /* ── Buttons ── */
        .btn {
            padding: 13px 20px;
            border-radius: 9px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.18s;
            border: none;
            width: 100%;
        }
        .btn-primary {
            background: var(--accent);
            color: #fff;
        }
        .btn-primary:hover { background: #c42f3c; }

        .btn-ghost {
            background: var(--card2);
            color: var(--text);
            border: 1px solid var(--border);
        }
        .btn-ghost:hover { border-color: var(--accent); color: var(--accent2); }

        .btn-disabled {
            background: var(--card2);
            color: var(--muted);
            border: 1px solid var(--border);
            cursor: not-allowed;
            opacity: 0.5;
        }

        .btn-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 16px;
        }

        /* ── Back ── */
        .back-btn {
            background: none;
            border: none;
            color: var(--muted);
            font-size: 0.88rem;
            cursor: pointer;
            padding: 6px 0;
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: color 0.18s;
        }
        .back-btn:hover { color: var(--text); }

        /* ── Stats display ── */
        .stat-display {
            text-align: center;
            padding: 30px 20px 24px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            margin-bottom: 14px;
        }
        .stat-label {
            font-size: 0.78rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 1.2px;
            margin-bottom: 10px;
        }
        .stat-odds {
            font-size: clamp(2rem, 8vw, 3.4rem);
            font-weight: 900;
            color: var(--accent);
            line-height: 1;
            margin-bottom: 6px;
        }
        .stat-risk {
            font-size: 0.9rem;
            color: var(--muted);
            margin-bottom: 18px;
        }
        .stat-risk strong { color: var(--accent2); }
        .stat-context {
            font-size: 0.88rem;
            color: #b0b0cc;
            background: var(--card2);
            border-radius: 9px;
            padding: 12px 14px;
            line-height: 1.55;
            text-align: left;
        }

        /* ── Filter tags ── */
        .filter-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 7px;
            margin-bottom: 14px;
        }
        .filter-tag {
            background: rgba(230,57,70,0.14);
            border: 1px solid rgba(230,57,70,0.28);
            color: var(--accent2);
            padding: 3px 11px;
            border-radius: 20px;
            font-size: 0.78rem;
        }

        /* ── Option list ── */
        .opt-btn {
            display: block;
            width: 100%;
            text-align: left;
            padding: 14px 18px;
            margin-bottom: 8px;
            background: var(--card2);
            border: 1px solid var(--border);
            border-radius: 10px;
            cursor: pointer;
            color: var(--text);
            font-size: 0.93rem;
            transition: border-color 0.18s, background 0.18s, padding-left 0.18s;
        }
        .opt-btn:last-child { margin-bottom: 0; }
        .opt-btn:hover {
            border-color: var(--accent);
            background: #1e1e30;
            padding-left: 22px;
        }
        .opt-btn strong { display: block; margin-bottom: 3px; }
        .opt-btn span { font-size: 0.81rem; color: var(--muted); }

        /* ── Category list ── */
        .cat-btn {
            display: block;
            width: 100%;
            text-align: left;
            padding: 16px 18px;
            margin-bottom: 8px;
            background: var(--card2);
            border: 1px solid var(--border);
            border-radius: 10px;
            cursor: pointer;
            color: var(--text);
            transition: border-color 0.18s, background 0.18s, padding-left 0.18s;
        }
        .cat-btn:last-child { margin-bottom: 0; }
        .cat-btn:hover {
            border-color: var(--accent);
            background: #1e1e30;
            padding-left: 22px;
        }
        .cat-btn .cat-icon { font-size: 1.3rem; margin-right: 10px; }
        .cat-btn .cat-name { font-weight: 700; font-size: 0.95rem; }
        .cat-btn .cat-q { font-size: 0.82rem; color: var(--muted); margin-top: 3px; padding-left: 38px; }

        .question-title {
            font-size: 1.15rem;
            font-weight: 700;
            margin-bottom: 18px;
        }

        .disclaimer {
            text-align: center;
            color: var(--muted);
            font-size: 0.76rem;
            margin-top: 4px;
        }

        /* ── Page tab bar ── */
        .page-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 28px;
        }
        .page-tab {
            flex: 1;
            padding: 11px 8px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--card2);
            color: var(--muted);
            font-size: 0.82rem;
            font-weight: 700;
            cursor: pointer;
            text-align: center;
            transition: all 0.18s;
        }
        .page-tab:hover {
            border-color: var(--accent);
            color: var(--text);
        }
        .page-tab.active {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
        }
    </style>
</head>
<body>
<div id="app"></div>

<script>

// HELPERS
// ═══════════════════════════════════════════════════════

function interpolate(table, year, fallback) {
    const keys = Object.keys(table).map(Number).sort((a, b) => a - b);
    if (year <= keys[0]) return Math.round(table[keys[0]] * Math.pow(0.94, keys[0] - year));
    if (year >= keys[keys.length - 1]) return table[keys[keys.length - 1]];
    for (let i = 0; i < keys.length - 1; i++) {
        if (year >= keys[i] && year <= keys[i + 1]) {
            const t = (year - keys[i]) / (keys[i + 1] - keys[i]);
            return Math.round(table[keys[i]] * (1 - t) + table[keys[i + 1]] * t);
        }
    }
    return fallback;
}

function fmtOdds(n) {
    n = Math.round(n);
    if (n >= 1_000_000) return `1 in ${(n / 1_000_000).toFixed(n >= 5_000_000 ? 0 : 1)}M`;
    if (n >= 10_000)    return `1 in ${Math.round(n / 1_000)}K`;
    return `1 in ${n.toLocaleString()}`;
}

function riskBadge(odds, id) {
    const scales = {
        // Activities
        skiing:     [[50_000,'Extreme'],[100_000,'High'],[200_000,'Moderate'],[300_000,'Low'],[Infinity,'Very Low']],
        plane:      [[500_000,'Dangerous'],[1_500_000,'Elevated'],[3_000_000,'Low'],[6_000_000,'Very Low'],[Infinity,'Ultra Low']],
        car:        [[5_000,'Extreme'],[10_000,'High'],[18_000,'Moderate'],[25_000,'Low'],[Infinity,'Very Low']],
        motorcycle: [[500,'Extreme'],[900,'Very High'],[1_500,'High'],[2_200,'Moderate'],[Infinity,'Lower']],
        swimming:   [[20_000,'High'],[50_000,'Moderate'],[90_000,'Low'],[Infinity,'Very Low']],
        climbing:   [[100,'Extreme'],[300,'Very High'],[700,'High'],[1_200,'Moderate'],[Infinity,'Lower']],
        // Natural disasters
        tsunami:    [[6,'Catastrophic'],[10,'Extreme'],[18,'Very High'],[30,'High'],[Infinity,'Moderate']],
        earthquake: [[20,'Catastrophic'],[50,'Extreme'],[100,'Very High'],[200,'High'],[Infinity,'Moderate']],
        hurricane:  [[8,'Catastrophic'],[30,'Extreme'],[150,'Very High'],[500,'High'],[Infinity,'Moderate']],
        tornado:    [[80,'Extreme'],[150,'Very High'],[280,'High'],[450,'Moderate'],[Infinity,'Lower']],
        wildfire:   [[100,'Extreme'],[250,'Very High'],[500,'High'],[1_000,'Moderate'],[Infinity,'Lower']],
        volcano:    [[5,'Catastrophic'],[15,'Extreme'],[40,'Very High'],[90,'High'],[Infinity,'Moderate']],
        lightning:  [[300_000,'Moderate'],[500_000,'Low'],[700_000,'Very Low'],[Infinity,'Ultra Low']],
    };
    for (const [thresh, label] of (scales[id] || scales.car)) {
        if (odds < thresh) return label;
    }
    return 'Low';
}

function act(type, payload) {
    const s = getScenarios()[state.scenarioId];
    switch (type) {
        case 'SELECT_SCENARIO':
            state.scenarioId = payload;
            state.screen = 'year';
            break;
        case 'SUBMIT_YEAR': {
            const yr = payload;
            const sc = getScenarios()[state.scenarioId];
            state.year = yr;
            state.currentOdds = sc.getBaseOdds(yr);
            state.filtersApplied = [];
            state.remainingCatIds = sc.deepenCategories.map(c => c.id);
            state.screen = 'stats';
            break;
        }
        case 'GO_HOME':
            resetState();
            break;
        case 'GO_DEEPER':
            state.screen = 'pickCategory';
            break;
        case 'PICK_CATEGORY':
            state.pendingCatId = payload;
            state.screen = 'pickOption';
            break;
        case 'SELECT_OPTION': {
            const cat = s.deepenCategories.find(c => c.id === state.pendingCatId);
            const opt = cat.options[payload];
            state.currentOdds = Math.round(state.currentOdds / opt.mult);
            state.filtersApplied.push({ catName: cat.name, optLabel: opt.label });
            state.remainingCatIds = state.remainingCatIds.filter(id => id !== state.pendingCatId);
            state.pendingCatId = null;
            state.screen = 'stats';
            break;
        }
        case 'BACK_TO_STATS':
            state.screen = 'stats';
            break;
        case 'BACK_TO_PICK':
            state.screen = 'pickCategory';
            break;
    }
    render();
}

// ═══════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════

function render() {
    document.getElementById('app').innerHTML = {
        home:         renderHome,
        year:         renderYear,
        stats:        renderStats,
        pickCategory: renderPickCategory,
        pickOption:   renderPickOption,
    }[state.screen]();

}

function renderHome() {
    const isDisasters = state.page === 1;
    const cards = Object.values(getScenarios()).map(sc => `
        <button class="scenario-btn" onclick="act('SELECT_SCENARIO','${sc.id}')">
            <span class="s-emoji">${sc.emoji}</span>
            <span class="s-name">${sc.name}</span>
        </button>
    `).join('');
    return `
        <div class="screen">
            <div class="page-tabs">
                <button class="page-tab ${!isDisasters ? 'active' : ''}" onclick="changePage(0)">☠️ Activities</button>
                <button class="page-tab ${isDisasters ? 'active' : ''}" onclick="changePage(1)">🌪️ Natural Disasters</button>
            </div>
            <div class="title" style="margin-bottom:24px">
                <h1>${isDisasters ? 'Natural Disasters' : 'Chance of Death'}</h1>
                <p>${isDisasters ? 'If it strikes where you are — what are your odds?' : 'Discover your real statistical odds — then dig deeper'}</p>
            </div>
            <div class="card">
                <div class="section-label">Choose a scenario</div>
                <div class="scenario-grid">${cards}</div>
            </div>
            <p class="disclaimer">Figures are approximate, based on published safety research. Educational use only.</p>
        </div>
    `;
}

function renderYear() {
    const sc = getScenarios()[state.scenarioId];
    const now = new Date().getFullYear();
    return `
        <div class="screen">
            <button class="back-btn" onclick="act('GO_HOME')">← Back</button>
            <div style="text-align:center;font-size:3rem;margin-bottom:14px">${sc.emoji}</div>
            <div class="card">
                <div class="question-title">${
                    sc.id === 'plane'       ? 'What year are you flying?' :
                    sc.id === 'swimming'    ? 'What year are you swimming?' :
                    sc.id === 'climbing'    ? 'What year are you climbing?' :
                    sc.id === 'skiing'      ? 'What year are you hitting the slopes?' :
                    sc.id === 'motorcycle'  ? 'What year are you riding?' :
                    sc.id === 'car'         ? 'What year are you driving?' :
                    'What year does the event occur?'
                }</div>
                <p style="color:var(--muted);font-size:0.88rem;margin-bottom:18px">Enter any year from ${sc.yearRange[0]} to ${sc.yearRange[1]} for historical or projected data.</p>
                <input type="number" id="yrIn" min="${sc.yearRange[0]}" max="${sc.yearRange[1]}" value="${now}" />
                <button class="btn btn-primary" style="margin-top:14px" onclick="submitYear()">Calculate My Odds →</button>
            </div>
        </div>
    `;
}

function submitYear() {
    const sc = getScenarios()[state.scenarioId];
    const val = parseInt(document.getElementById('yrIn').value);
    if (isNaN(val) || val < sc.yearRange[0] || val > sc.yearRange[1]) {
        const el = document.getElementById('yrIn');
        el.classList.add('error');
        el.placeholder = `Year must be ${sc.yearRange[0]}–${sc.yearRange[1]}`;
        el.value = '';
        return;
    }
    act('SUBMIT_YEAR', val);
}

function renderStats() {
    const sc   = getScenarios()[state.scenarioId];
    const odds = state.currentOdds;
    const risk = riskBadge(odds, sc.id);
    const canDeepen = state.remainingCatIds.length > 0;

    const tags = state.filtersApplied.map(f =>
        `<span class="filter-tag">${f.catName}: ${f.optLabel}</span>`
    ).join('');

    return `
        <div class="screen">
            ${state.filtersApplied.length ? `<div class="filter-tags">${tags}</div>` : ''}
            <div class="stat-display">
                <div class="stat-label">Chance of death per ${sc.unit} in ${state.year}</div>
                <div class="stat-odds">${fmtOdds(odds)}</div>
                <div class="stat-risk">Risk level: <strong>${risk}</strong></div>
                <div class="stat-context">${sc.context(state.year, odds)}</div>
            </div>
            <div class="btn-row">
                <button class="btn btn-ghost" onclick="act('GO_HOME')">✓ Happy with answer</button>
                ${canDeepen
                    ? `<button class="btn btn-primary" onclick="act('GO_DEEPER')">Go Deeper →</button>`
                    : `<button class="btn btn-disabled" disabled>No more filters</button>`
                }
            </div>
        </div>
    `;
}

function renderPickCategory() {
    const sc = getScenarios()[state.scenarioId];
    const cats = state.remainingCatIds.map(id => sc.deepenCategories.find(c => c.id === id));
    const btns = cats.map(cat => `
        <button class="cat-btn" onclick="act('PICK_CATEGORY','${cat.id}')">
            <span>
                <span class="cat-icon">${cat.icon}</span>
                <span class="cat-name">${cat.name}</span>
            </span>
            <div class="cat-q">${cat.question}</div>
        </button>
    `).join('');
    return `
        <div class="screen">
            <button class="back-btn" onclick="act('BACK_TO_STATS')">← Back to Stats</button>
            <div class="card">
                <div class="section-label">Refine your odds by...</div>
                ${btns}
            </div>
        </div>
    `;
}

function renderPickOption() {
    const sc  = getScenarios()[state.scenarioId];
    const cat = sc.deepenCategories.find(c => c.id === state.pendingCatId);
    const isLong = cat.options.length > 10;

    const btns = cat.options.map((opt, i) => `
        <button class="opt-btn" data-search="${opt.label.toLowerCase()}" onclick="act('SELECT_OPTION',${i})">
            <strong>${opt.label}</strong>
            <span>${opt.note}</span>
        </button>`).join('');

    const searchBox = isLong ? `
        <input type="text" id="optSearch"
            placeholder="Type to search countries…"
            oninput="filterOpts(this.value)"
            autocomplete="off"
            style="width:100%;padding:11px 15px;background:var(--card2);border:1px solid var(--border);
                   border-radius:8px;color:var(--text);font-size:0.95rem;outline:none;
                   margin-bottom:14px;transition:border-color 0.18s;display:block"
            onfocus="this.style.borderColor='var(--accent)'"
            onblur="this.style.borderColor='var(--border)'"
        >
        <p id="noMatch" style="display:none;color:var(--muted);font-size:0.88rem;padding:8px 0">
            No countries matched — try a different spelling.
        </p>` : '';

    return `
        <div class="screen">
            <button class="back-btn" onclick="act('BACK_TO_PICK')">← Back</button>
            <div class="card">
                <div class="section-label">${cat.icon} ${cat.name}</div>
                <div class="question-title" style="margin-bottom:14px">${cat.question}</div>
                ${searchBox}
                <div id="optList">${btns}</div>
            </div>
        </div>
    `;
}

function filterOpts(query) {
    const q = query.toLowerCase().trim();
    let anyVisible = false;
    document.querySelectorAll('#optList .opt-btn').forEach(btn => {
        const match = !q || btn.dataset.search.includes(q);
        btn.style.display = match ? '' : 'none';
        if (match) anyVisible = true;
    });
    const noMatch = document.getElementById('noMatch');
    if (noMatch) noMatch.style.display = anyVisible ? 'none' : '';
}

// ═══════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════
render();
</script>
</body>
</html>
